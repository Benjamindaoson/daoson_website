<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgVite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fefce8"/>
      <stop offset="1" stop-color="#fff7d6"/>
    </linearGradient>
    <pattern id="dotsVite" patternUnits="userSpaceOnUse" width="32" height="32">
      <circle cx="16" cy="16" r="1.4" fill="#d97706" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bgVite)"/>
  <rect width="1200" height="675" fill="url(#dotsVite)"/>

  <!-- 终端窗口 -->
  <g transform="translate(80,140)">
    <rect width="1040" height="380" rx="14" fill="#1e1e1e"/>
    <!-- 红黄绿点 -->
    <circle cx="28" cy="28" r="9" fill="#ff5f56"/>
    <circle cx="56" cy="28" r="9" fill="#ffbd2e"/>
    <circle cx="84" cy="28" r="9" fill="#27c93f"/>
    <text x="116" y="34" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" fill="#888">~ — vite</text>

    <text x="40" y="120" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="28" fill="#50fa7b">$ </text>
    <text x="80" y="120" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="28" fill="#f8f8f2">npm create vite@latest</text>
    <text x="40" y="170" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#8be9fd">✔ Project name: my-app</text>
    <text x="40" y="208" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#8be9fd">✔ Framework: Vue + TS</text>
    <text x="40" y="246" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#888">Scaffolding project...</text>
    <text x="40" y="294" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#f1fa8c">  Done in 1.2s ⚡</text>

    <text x="40" y="346" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="28" fill="#50fa7b">$ </text>
    <text x="80" y="346" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="28" fill="#f1fa8c">_</text>
  </g>

  <text x="80" y="600" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#92400e" opacity="0.7">// 系列：前端工程实践</text>
</svg>
