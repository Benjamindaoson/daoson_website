name: Build & Deploy Jekyll to GitHub Pages

# 触发：push 到 main / master，或手动触发
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

# Pages 部署需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个 deploy，避免并发互相覆盖
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true   # 自动 bundle install + 缓存

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination _site

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install rsvg-convert (for OG card PNG conversion)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y librsvg2-bin

      - name: Convert OG SVG cards to PNG
        run: |
          mkdir -p _site/assets/og-cards-png
          for f in _site/assets/og-cards/*.svg; do
            [ -e "$f" ] || continue
            name=$(basename "$f" .svg)
            rsvg-convert -w 1200 -h 630 -o "_site/assets/og-cards-png/${name}.png" "$f" || true
          done
          echo "Generated $(ls _site/assets/og-cards-png/*.png 2>/dev/null | wc -l) PNG OG cards"

      - name: Build Pagefind search index
        run: |
          npx --yes pagefind@latest --site _site --output-subdir pagefind

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
