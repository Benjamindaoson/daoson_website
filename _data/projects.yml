# ============================================
# 项目数据 - 编辑此文件即可更新 projects 页面
# ============================================
#
# 字段说明：
#   name_zh     - 中文项目名（必填）
#   name_en     - English project name（必填）
#   description_zh / description_en - 一句话简介（必填）
#   icon        - 图标符号（一两个字符，如 { }、>_、⚡）
#   status      - active | prototype | learning | archived
#   category    - web | cli | tool | game | library | ai （用于筛选）
#   url         - 项目链接（GitHub / Demo）
#   stars       - GitHub star 数（可省）
#   lang        - 主要语言
#   year        - 年份
#   hypothesis_zh / hypothesis_en - 正在验证的核心假设（可省）
#   problem_zh / problem_en - 这个项目想解决的问题（可省）
#   next_zh / next_en - 下一步计划或正在整理的内容（可省）
#   visibility  - public | private | writing
#   public_boundary_zh / public_boundary_en - 当前公开边界（可省）
# ============================================

- name_zh: "数字员工系统"
  name_en: "Digital Employee System"
  description_zh: "一个正在构建中的智能体实验，重点在协作协议、工具调用可靠性、状态恢复和人在回路。"
  description_en: "An active agent-systems experiment focused on coordination protocols, reliable tool use, state recovery, and human-in-the-loop design."
  icon: "🤖"
  status: active
  category: ai
  url: "https://github.com/Benjamindaoson"
  lang: "Python · TypeScript"
  year: 2026
  hypothesis_zh: "多个智能体只有通过清晰协议、可靠工具调用和必要的人类介入，才可能从演示走向可持续工作流。"
  hypothesis_en: "Agents only become useful working systems when coordination protocols, reliable tool use, and human checkpoints are designed together."
  problem_zh: "探索多个大语言模型智能体如何分工、协作、调用工具，并在失败时恢复到可控状态。"
  problem_en: "Exploring how multiple language-model agents can divide work, coordinate, call tools, and recover from failures in a controlled way."
  public_boundary_zh: "目前只公开方向、问题背景和构建记录；具体仓库、演示和实现细节还在整理中。"
  public_boundary_en: "For now, only the direction, problem context, and build notes are public; the repository, demo, and implementation details are still being organized."
  next_zh: "补充一篇可公开的系统说明，讲清楚当前原型状态、架构取舍、还没有解决的问题，以及是否能开放具体仓库。"
  next_en: "Publish a public system note covering the current prototype state, architecture tradeoffs, unsolved problems, and whether a specific repository can be opened."
  visibility: writing

