# ============================================
# Jekyll 站点配置
# ============================================

# 站点信息
title: "本杰铭"
description: "本杰铭的中文技术网站，记录 Agent 系统、评估、可靠 AI 应用工程、技术写作和长期知识积累。"
author: "本杰铭"
email: "benjamindaoson@gmail.com"

# 部署地址
# 如果用 用户名.github.io 仓库 → url 填 https://用户名.github.io ，baseurl 留空
# 如果用 项目仓库（如 blog）   → url 填 https://用户名.github.io ，baseurl 填 "/blog"
url: "https://Benjamindaoson.github.io"
baseurl: "/daoson_website"

# 社交链接（在页脚、关于页用）
github_username: "Benjamindaoson"
twitter_username: "Benjamindaoson"

# 构建配置
markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/
timezone: Asia/Shanghai

# ============================================
# 多语言（i18n）—— 真双语
# ============================================
# 站点支持的语言列表。第一个是默认语言。
# 每篇 post / note 通过 front matter 的 lang 字段标明语言；
# 互为翻译的两篇文章共享同一个 translation_key 字段。
languages:
  - code: zh
    label: 中文
    locale: zh-CN
  - code: en
    label: English
    locale: en-US
default_language: zh

# RSS 拆成两个 feed（按语言）
# jekyll-feed 支持 collections 配置：feed.collections.notes.path
# 但更可控的做法是为每种语言生成一个 feed 文件，见 feed-zh.xml / feed-en.xml
feed:
  excerpt_only: false
  collections:
    notes:
      path: "/feed-notes.xml"

# 启用的插件（已切换到 GitHub Actions 构建，可用自定义插件）
plugins:
  - jekyll-feed         # 自动生成 RSS
  - jekyll-seo-tag      # 自动生成 SEO meta 标签
  - jekyll-sitemap      # 生成 sitemap.xml
  - jekyll-paginate     # 首页分页

# ============================================
# Collections —— 博客 + 笔记两套内容
# ============================================
collections:
  projects:
    output: true
    permalink: /projects/:name/
  notes:
    output: true
    permalink: /notes/:path/
    sort_by: updated
  til:
    output: true
    permalink: /til/:path/
    sort_by: date

# 首页分页（仅针对 posts，不影响 notes）
paginate: 8
paginate_path: "/page:num/"

# 默认 front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "zh"           # 默认中文；英文版文章 front matter 写 lang: en
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "note"
      status: "seedling"   # 默认成熟度：刚发芽
      lang: "zh"           # 默认中文，可在单篇里覆盖为 en
  - scope:
      path: ""
      type: "til"
    values:
      layout: "til"
      lang: "zh"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      lang: "zh"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Markdown 配置
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    block:
      line_numbers: true

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - AGENTS.md
  - CONTENT_SCHEMA.md
  - README.md
  - docs
  - scripts
  - node_modules
  - .tmp-npm-cache
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .git
  - .github
  - _drafts
  - _daily
